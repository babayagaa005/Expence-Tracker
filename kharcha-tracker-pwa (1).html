  <title>Kharcha Tracker 💚</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --g1: #1a7a4a; --g2: #22a060; --g3: #2ecc80;
      --g4: #e8f9f0; --g5: #c5f0d8; --gdk: #0d4a2a;
      --red: #e24b4a; --red-bg: #fcebeb; --red-dark: #a32d2d;
      --surface: #ffffff; --surface2: #f6f7f5;
      --border: rgba(0,0,0,0.10); --border2: rgba(0,0,0,0.18);
      --text: #1a1a1a; --text2: #666; --text3: #999;
      --radius: 12px; --radius-sm: 8px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { font-family: 'Outfit', sans-serif; background: var(--surface2); min-height: 100dvh; display: flex; justify-content: center; }
    #app { width: 100%; max-width: 430px; min-height: 100dvh; background: var(--surface); display: flex; flex-direction: column; }

    .header { background: var(--g1); padding: 52px 20px 32px; position: relative; overflow: hidden; }
    .header::before { content:''; position:absolute; top:-40px; right:-40px; width:180px; height:180px; border-radius:50%; background:rgba(255,255,255,0.06); }
    .header::after  { content:''; position:absolute; bottom:-60px; left:-20px; width:220px; height:220px; border-radius:50%; background:rgba(255,255,255,0.04); }
    .header-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; position:relative; z-index:1; }
    .app-name { font-size:20px; font-weight:700; color:white; }
    .date-badge { font-size:12px; background:rgba(255,255,255,0.15); color:rgba(255,255,255,0.9); padding:5px 12px; border-radius:20px; font-weight:500; }
    .balance-section { position:relative; z-index:1; }
    .balance-label { font-size:11px; color:rgba(255,255,255,0.65); text-transform:uppercase; letter-spacing:1px; margin-bottom:4px; }
    .balance-amount { font-size:38px; font-weight:700; color:white; line-height:1.1; }
    .balance-amount.negative { color:#ffb3b3; }
    .balance-sub { font-size:12px; color:rgba(255,255,255,0.55); margin-top:4px; }

    .stats-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; padding:16px; margin-top:-20px; position:relative; z-index:10; }
    .stat-card { background:var(--surface); border:0.5px solid var(--border); border-radius:var(--radius); padding:14px; box-shadow:0 2px 12px rgba(0,0,0,0.07); }
    .stat-label { font-size:11px; color:var(--text2); margin-bottom:6px; font-weight:500; text-transform:uppercase; letter-spacing:0.5px; }
    .stat-amount { font-size:20px; font-weight:700; }
    .stat-amount.income  { color:var(--g1); }
    .stat-amount.expense { color:var(--red); }

    .add-section { padding:0 16px 16px; }
    .add-card { background:var(--g4); border:1px solid var(--g5); border-radius:var(--radius); padding:16px; }
    .add-card-title { font-size:14px; font-weight:600; color:var(--gdk); margin-bottom:12px; }
    .type-toggle { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:12px; }
    .type-btn { height:36px; border-radius:var(--radius-sm); border:1px solid var(--border2); font-size:13px; font-family:'Outfit',sans-serif; font-weight:500; cursor:pointer; background:var(--surface); color:var(--text2); transition:all 0.18s; }
    .type-btn.active-expense { background:var(--red-bg); color:var(--red-dark); border-color:#f09595; }
    .type-btn.active-income  { background:var(--g4); color:var(--gdk); border-color:var(--g3); }
    .input-row { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:8px; }
    .field { height:42px; border:1px solid var(--border2); border-radius:var(--radius-sm); padding:0 12px; font-size:14px; font-family:'Outfit',sans-serif; background:var(--surface); color:var(--text); width:100%; outline:none; transition:border-color 0.15s; }
    .field:focus { border-color:var(--g2); }
    .field.error { border-color:var(--red) !important; animation:shake 0.3s; }
    @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }
    .desc-field { width:100%; height:42px; border:1px solid var(--border2); border-radius:var(--radius-sm); padding:0 12px; font-size:14px; font-family:'Outfit',sans-serif; background:var(--surface); color:var(--text); outline:none; margin-bottom:10px; transition:border-color 0.15s; }
    .desc-field:focus { border-color:var(--g2); }
    .add-btn { width:100%; height:44px; background:var(--g2); color:white; border:none; border-radius:var(--radius-sm); font-size:15px; font-family:'Outfit',sans-serif; font-weight:600; cursor:pointer; transition:background 0.15s, transform 0.1s; }
    .add-btn:hover  { background:var(--g1); }
    .add-btn:active { transform:scale(0.98); }

    .cat-section { padding:0 16px 12px; }
    .section-hdr { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
    .section-title { font-size:12px; font-weight:600; color:var(--text2); text-transform:uppercase; letter-spacing:0.7px; }
    .bar-item { display:flex; align-items:center; gap:10px; margin-bottom:8px; }
    .bar-label { font-size:12px; color:var(--text); width:75px; flex-shrink:0; font-weight:500; }
    .bar-track { flex:1; height:7px; background:var(--g5); border-radius:4px; overflow:hidden; }
    .bar-fill { height:100%; background:var(--g2); border-radius:4px; transition:width 0.5s cubic-bezier(.4,0,.2,1); }
    .bar-val { font-size:11px; color:var(--text2); min-width:55px; text-align:right; font-weight:500; }

    .divider { height:0.5px; background:var(--border); margin:4px 16px 12px; }
    .list-section { padding:0 16px; flex:1; }
    .list-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
    .list-title { font-size:12px; font-weight:600; color:var(--text2); text-transform:uppercase; letter-spacing:0.7px; }
    .clear-btn { background:none; border:none; font-size:12px; color:var(--red); cursor:pointer; font-family:'Outfit',sans-serif; font-weight:500; padding:4px 8px; border-radius:6px; transition:background 0.15s; }
    .clear-btn:hover { background:var(--red-bg); }
    .txn-list { display:flex; flex-direction:column; gap:8px; padding-bottom:32px; }
    .txn-item { display:flex; align-items:center; gap:12px; background:var(--surface); border:0.5px solid var(--border); border-radius:var(--radius); padding:12px 14px; animation:slideIn 0.2s ease; }
    @keyframes slideIn { from{opacity:0;transform:translateY(-8px)} to{opacity:1;transform:translateY(0)} }
    .txn-icon { width:38px; height:38px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:18px; flex-shrink:0; }
    .txn-icon.expense { background:var(--red-bg); }
    .txn-icon.income  { background:var(--g4); }
    .txn-info { flex:1; min-width:0; }
    .txn-desc { font-size:14px; font-weight:600; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .txn-cat { font-size:11px; color:var(--text3); margin-top:1px; }
    .txn-right { display:flex; align-items:center; gap:8px; flex-shrink:0; }
    .txn-amount { font-size:15px; font-weight:700; }
    .txn-amount.expense { color:var(--red); }
    .txn-amount.income  { color:var(--g1); }
    .txn-del { background:none; border:none; cursor:pointer; color:var(--text3); font-size:15px; padding:4px 6px; border-radius:6px; transition:all 0.15s; }
    .txn-del:hover { background:var(--red-bg); color:var(--red); }
    .empty-state { text-align:center; padding:40px 20px; color:var(--text3); }
    .empty-icon { font-size:48px; display:block; margin-bottom:10px; }
    .empty-text { font-size:15px; font-weight:500; color:var(--text2); }
    .empty-sub  { font-size:13px; margin-top:4px; }

    /* PWA Install Banner */
    #install-banner { display:none; align-items:center; gap:12px; background:linear-gradient(135deg,#0d4a2a,#1a7a4a); padding:12px 16px; margin:12px 16px 0; border-radius:12px; }
    .install-icon { font-size:26px; flex-shrink:0; }
    .install-text { flex:1; }
    .install-text strong { display:block; font-size:13px; font-weight:700; color:white; }
    .install-text span { font-size:11px; color:rgba(255,255,255,0.7); }
    .install-actions { display:flex; gap:6px; flex-shrink:0; }
    .install-btn { height:32px; padding:0 12px; border-radius:8px; border:none; font-size:12px; font-family:'Outfit',sans-serif; font-weight:600; cursor:pointer; }
    .install-btn.primary { background:white; color:#1a7a4a; }
    .install-btn.dismiss { background:rgba(255,255,255,0.15); color:white; }
  </style>
</head>
<body>
<div id="app">

  <div class="header">
    <div class="header-top">
      <div class="app-name">💚 Kharcha Tracker</div>
      <div class="date-badge" id="today-date"></div>
    </div>
    <div class="balance-section">
      <div class="balance-label">Aaj ka Balance</div>
      <div class="balance-amount" id="balance-display">Rs 0</div>
      <div class="balance-sub" id="balance-sub">Koi entry nahi</div>
    </div>
  </div>

  <!-- PWA Install Banner -->
  <div id="install-banner">
    <div class="install-icon">📲</div>
    <div class="install-text">
      <strong>App Install karo!</strong>
      <span>Home screen pe add karo — offline bhi chalegi</span>
    </div>
    <div class="install-actions">
      <button class="install-btn primary" onclick="installApp()">Install</button>
      <button class="install-btn dismiss" onclick="dismissBanner()">✕</button>
    </div>
  </div>

  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-label">📈 Aamdani</div>
      <div class="stat-amount income" id="total-income">Rs 0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">📉 Kharcha</div>
      <div class="stat-amount expense" id="total-expense">Rs 0</div>
    </div>
  </div>

  <div class="add-section">
    <div class="add-card">
      <div class="add-card-title">➕ Naya Entry Karo</div>
      <div class="type-toggle">
        <button class="type-btn active-expense" id="btn-expense" onclick="setType('expense')">➖ Kharcha</button>
        <button class="type-btn" id="btn-income" onclick="setType('income')">➕ Aamdani</button>
      </div>
      <div class="input-row">
        <input class="field" type="number" id="amount-input" placeholder="Raqam (Rs)" min="1" />
        <select class="field" id="cat-input">
          <option value="🍽 Khana">🍽 Khana</option>
          <option value="🚗 Transport">🚗 Transport</option>
          <option value="🛍 Shopping">🛍 Shopping</option>
          <option value="💊 Sehat">💊 Sehat</option>
          <option value="👨‍👩‍👧 Rishtedar">👨‍👩‍👧 Rishtedar</option>
          <option value="⚡ Bijli/Gas">⚡ Bijli/Gas</option>
          <option value="💼 Salary">💼 Salary</option>
          <option value="📦 Aur">📦 Aur</option>
        </select>
      </div>
      <input class="desc-field" type="text" id="desc-input" placeholder="Wajah likhein (Biryani, Uber...)" />
      <button class="add-btn" onclick="addTransaction()">✓ Shamil Karo</button>
    </div>
  </div>

  <div class="cat-section" id="cat-section" style="display:none">
    <div class="section-hdr"><span class="section-title">📊 Category Breakdown</span></div>
    <div id="cat-bars"></div>
  </div>

  <div class="divider" id="divider" style="display:none"></div>

  <div class="list-section">
    <div class="list-header">
      <span class="list-title">🧾 Transactions</span>
      <button class="clear-btn" onclick="clearAll()">🗑 Sab Saaf</button>
    </div>
    <div class="txn-list" id="txn-list">
      <div class="empty-state">
        <span class="empty-icon">🧾</span>
        <div class="empty-text">Abhi koi entry nahi!</div>
        <div class="empty-sub">Upar se pehli entry karo 👆</div>
      </div>
    </div>
  </div>

</div>
<script>
  let txns = JSON.parse(localStorage.getItem('kharchaData') || '[]');
  let currentType = 'expense';
  const fmt = n => 'Rs ' + Math.round(Math.abs(n)).toLocaleString('en-PK');

  const d = new Date();
  document.getElementById('today-date').textContent =
    d.toLocaleDateString('en-PK', { weekday:'short', day:'numeric', month:'short' });

  function save() { localStorage.setItem('kharchaData', JSON.stringify(txns)); }

  function setType(t) {
    currentType = t;
    document.getElementById('btn-expense').className = 'type-btn' + (t==='expense'?' active-expense':'');
    document.getElementById('btn-income').className  = 'type-btn' + (t==='income' ?' active-income' :'');
  }

  function addTransaction() {
    const amtEl = document.getElementById('amount-input');
    const amt = parseFloat(amtEl.value);
    if (!amt || amt <= 0) {
      amtEl.classList.add('error');
      amtEl.focus();
      setTimeout(() => amtEl.classList.remove('error'), 800);
      return;
    }
    const cat  = document.getElementById('cat-input').value;
    const desc = document.getElementById('desc-input').value.trim() || cat;
    txns.unshift({ id: Date.now(), type: currentType, amt, cat, desc });
    save();
    amtEl.value = '';
    document.getElementById('desc-input').value = '';
    render();
  }

  function deleteTransaction(id) { txns = txns.filter(t => t.id !== id); save(); render(); }

  function clearAll() {
    if (!txns.length) return;
    if (confirm('Sab entries delete karna chahte ho?')) { txns = []; save(); render(); }
  }

  function render() {
    const income  = txns.filter(t=>t.type==='income').reduce((s,t)=>s+t.amt,0);
    const expense = txns.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amt,0);
    const balance = income - expense;

    const bd = document.getElementById('balance-display');
    bd.textContent = (balance < 0 ? '−' : '') + fmt(balance);
    bd.className = 'balance-amount' + (balance < 0 ? ' negative' : '');
    document.getElementById('balance-sub').textContent = txns.length
      ? (balance >= 0 ? '✅ Aacha hai!' : '⚠️ Kharcha zyada hai!')
      : 'Koi entry nahi';

    document.getElementById('total-income').textContent  = fmt(income);
    document.getElementById('total-expense').textContent = fmt(expense);

    const list = document.getElementById('txn-list');
    if (!txns.length) {
      list.innerHTML = `<div class="empty-state"><span class="empty-icon">🧾</span><div class="empty-text">Abhi koi entry nahi!</div><div class="empty-sub">Upar se pehli entry karo 👆</div></div>`;
      document.getElementById('cat-section').style.display = 'none';
      document.getElementById('divider').style.display = 'none';
      return;
    }

    list.innerHTML = txns.map(t => `
      <div class="txn-item">
        <div class="txn-icon ${t.type}">${t.type==='expense'?'💸':'💵'}</div>
        <div class="txn-info">
          <div class="txn-desc">${t.desc}</div>
          <div class="txn-cat">${t.cat}</div>
        </div>
        <div class="txn-right">
          <div class="txn-amount ${t.type}">${t.type==='expense'?'−':'+'}${fmt(t.amt)}</div>
          <button class="txn-del" onclick="deleteTransaction(${t.id})">✕</button>
        </div>
      </div>`).join('');

    const expTxns = txns.filter(t=>t.type==='expense');
    if (expTxns.length) {
      const totals = {};
      expTxns.forEach(t => { totals[t.cat] = (totals[t.cat]||0) + t.amt; });
      const maxVal = Math.max(...Object.values(totals));
      const sorted = Object.entries(totals).sort((a,b)=>b[1]-a[1]).slice(0,5);
      document.getElementById('cat-section').style.display = 'block';
      document.getElementById('divider').style.display = 'block';
      document.getElementById('cat-bars').innerHTML = sorted.map(([cat,val]) => `
        <div class="bar-item">
          <div class="bar-label">${cat.split(' ').slice(1).join(' ') || cat}</div>
          <div class="bar-track"><div class="bar-fill" style="width:${Math.round(val/maxVal*100)}%"></div></div>
          <div class="bar-val">${fmt(val)}</div>
        </div>`).join('');
    } else {
      document.getElementById('cat-section').style.display = 'none';
      document.getElementById('divider').style.display = 'none';
    }
  }

  render();
  document.addEventListener('keydown', e => { if (e.key==='Enter') addTransaction(); });

  // ✅ Service Worker Registration (PWA ke liye)
  if ('serviceWorker' in navigator) {
    const swCode = `
      const CACHE = 'kharcha-v1';
      self.addEventListener('install', e => {
        e.waitUntil(caches.open(CACHE).then(c => c.addAll(['/'])));
        self.skipWaiting();
      });
      self.addEventListener('activate', e => {
        e.waitUntil(caches.keys().then(keys => Promise.all(
          keys.filter(k => k !== CACHE).map(k => caches.delete(k))
        )));
        self.clients.claim();
      });
      self.addEventListener('fetch', e => {
        e.respondWith(caches.match(e.request).then(r => r || fetch(e.request)));
      });
    `;
    const swBlob = new Blob([swCode], { type: 'application/javascript' });
    const swUrl  = URL.createObjectURL(swBlob);
    navigator.serviceWorker.register(swUrl).catch(() => {});
  }

  // ✅ PWA Install Prompt Banner
  let deferredPrompt = null;
  window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault();
    deferredPrompt = e;
    const banner = document.getElementById('install-banner');
    if (banner) banner.style.display = 'flex';
  });
  window.addEventListener('appinstalled', () => {
    const banner = document.getElementById('install-banner');
    if (banner) banner.style.display = 'none';
  });
  function installApp() {
    if (deferredPrompt) {
      deferredPrompt.prompt();
      deferredPrompt.userChoice.then(() => { deferredPrompt = null; });
      document.getElementById('install-banner').style.display = 'none';
    }
  }
  function dismissBanner() {
    document.getElementById('install-banner').style.display = 'none';
  }
</script>
</body>
</html>
